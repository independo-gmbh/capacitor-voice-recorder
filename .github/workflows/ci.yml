# Based on https://github.com/ionic-team/capacitor-plugins/blob/main/.github/workflows/ci.yml
name: "CI"
permissions:
  contents: read
on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - '**'

jobs:
  lint:
    runs-on: macos-15
    timeout-minutes: 30
    name: "Linting"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  test_web:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: "Web Unit Tests"
    needs:
      - lint
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:web

  test_android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: "Android Unit Tests"
    needs:
      - lint
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK 36 packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:android

  test_ios:
    runs-on: macos-15
    timeout-minutes: 30
    name: "iOS Unit Tests"
    needs:
      - lint
    steps:
      - run: sudo xcode-select --switch /Applications/Xcode_16.4.app
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:ios

  build-example:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: "Build Example App"
    needs:
      - test_web
      - test_android
      - test_ios
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm -C example run build

  verify-ios:
    runs-on: macos-15
    timeout-minutes: 30
    name: "iOS Verification"
    needs:
      - lint
      - test_ios
    steps:
      - run: sudo xcode-select --switch /Applications/Xcode_16.4.app
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify:ios

  verify-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: "Android Verification"
    needs:
      - lint
      - test_android
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK 36 packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify:android

  verify-web:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: "Web Verification"
    needs:
      - lint
      - test_web
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify:web

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: "Build Plugin"
    needs:
      - verify-web
      - verify-ios
      - verify-android
      - build-example
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance
    timeout-minutes: 30
    name: "Publish Plugin"
    needs:
      - build
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      # semantic-release publishes to npm; keep npm current for OIDC provenance support
      - run: npm i -g npm@^11.5.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prepublishOnly
      - name: 'Semantic Release'
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
